<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <style>
      body {
        height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .container {
        display: flex;
        justify-content: space-between;
        align-items: center;
        padding: 20px;
        background: white;
        gap: 16px;
        border-radius: 9999px;
        box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
      }
      .btn {
        /* color: white; */
        padding: 8px 16px;
        border: none;
        border-radius: 24px;
        box-shadow: rgba(100, 100, 111, 0.2) 0px 7px 29px 0px;
      }
    </style>
  </head>
  <body>
    <div class="container">
      <button class="btn" id="start">start</button>
      <button class="btn" id="copy">Copy hexcode</button>
      <button class="btn" id="stop">stop</button>
    </div>
    <script src="script.js"></script>
  </body>
</html>
